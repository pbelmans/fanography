<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<script>
  // KaTeX delimiters matching the data ($...$ inline, $$...$$ / \[...\] display).
  // KaTeX's auto-render omits single $ by default, so it is listed explicitly ($$ before $).
  var fanographyKatexOpts = {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "\\[", right: "\\]", display: true},
      {left: "$", right: "$", display: false},
      {left: "\\(", right: "\\)", display: false}
    ],
    throwOnError: false
  };
  document.addEventListener("DOMContentLoaded", function () {
    renderMathInElement(document.body, fanographyKatexOpts);

    // Bootstrap tooltips (replace jQuery init); re-render KaTeX inside the tooltip once shown,
    // because tooltip titles also contain $...$ (the plaintext descriptions).
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (el) {
      el.addEventListener("shown.bs.tooltip", function () {
        document.querySelectorAll(".tooltip-inner").forEach(function (inner) {
          renderMathInElement(inner, fanographyKatexOpts);
        });
      });
      new bootstrap.Tooltip(el, {html: true});
    });

    // Keyboard navigation (issue #1): left/right arrows follow the prev/next links.
    document.addEventListener("keydown", function (e) {
      if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return;
      if (/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      var sel = e.key === "ArrowLeft" ? "a.previous"
              : e.key === "ArrowRight" ? "a.next" : null;
      if (!sel) return;
      var link = document.querySelector(sel);
      if (link) window.location.href = link.href;
    });
  });
</script>
